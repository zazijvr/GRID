name: "Build Desktop"

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-tauri:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: "ubuntu-22.04"
            args: ""
          - platform: "windows-latest"
            args: ""
    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      # Install Node (needed for some tooling like Tauri CLI under the hood even with bun)
      - name: Setup node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      # Původně projekt používá Bun místo NPM
      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      # Dependencies for Linux
      - name: Install dependencies (Ubuntu only)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libglib2.0-dev libwebkit2gtk-4.1-dev build-essential \
            curl logrotate wget file libssl-dev libgtk-3-dev libayatana-appindicator3-dev \
            librsvg2-dev patchelf

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'ubuntu-22.04' && 'x86_64-unknown-linux-gnu' || 'x86_64-pc-windows-msvc' }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      - name: Install frontend dependencies
        run: bun install

      # Zazij VR Grid neobsahuje Tauri v package.json závislostech automaticky,
      # musí se spustit přes Bun runner anebo nechat Tauri action stáhnout Tauri cli
      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          args: ${{ matrix.args }}
          tagName: "v__VERSION__"
          releaseName: "GRID Desktop v__VERSION__"
          releaseBody: "Automatický build pro hudební aplikaci GRID."
          releaseDraft: true
          prerelease: false
